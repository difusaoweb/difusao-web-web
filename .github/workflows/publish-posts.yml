name: Publish Scheduled Posts

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Call publish endpoint
        run: |
          curl \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/publish"
